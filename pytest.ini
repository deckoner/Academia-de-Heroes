[pytest]
DJANGO_SETTINGS_MODULE = academia_de_heroes.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --tb=short -p no:warnings --reuse-db
testpaths = app/tests
markers =
    unit: Unit tests
    e2e: End-to-end tests
    slow: Slow running tests
