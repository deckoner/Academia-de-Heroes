name: Django CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: academia_de_heroes.settings
      PYTHONPATH: .

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django playwright
          playwright install --with-deps

      - name: Limpiar base de datos SQLite
        run: |
          # Borra SQLite residual si existe
          if [ -f db.sqlite3 ]; then rm db.sqlite3; fi
          # Borra archivos pycache y migraciones viejas opcionales
          find . -path "*/migrations/*.pyc" -delete
          find . -path "*/migrations/__pycache__" -delete

      - name: Ejecutar migraciones
        run: |
          python manage.py migrate

      - name: Ejecutar tests
        run: |
          pytest