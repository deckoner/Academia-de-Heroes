name: Django CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: academia_de_heroes.settings
      PYTHONPATH: .

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django playwright
          playwright install --with-deps

      - name: Limpiar SQLite y migraciones
        run: |
          echo "Borrando db.sqlite3 si existe"
          rm -f db.sqlite3
          echo "Borrando __pycache__ de migraciones"
          find . -path "*/migrations/__pycache__" -exec rm -rf {} +
          echo "Borrando archivos .pyc de migraciones"
          find . -name "*.pyc" -delete

      - name: Ejecutar migraciones desde cero
        run: |
          python manage.py makemigrations
          python manage.py migrate

      - name: Ejecutar tests
        run: |
          pytest
