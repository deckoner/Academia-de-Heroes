<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Academia de Heroes{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <h1>Academia de Heroes</h1>
            <ul>
                <li><a href="{% url 'crear_personaje' %}">Crear Personaje</a></li>
                <li><a href="{% url 'lista_personajes' %}">Lista Personajes</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>
</body>
</html>
