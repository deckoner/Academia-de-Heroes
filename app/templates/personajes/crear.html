{% extends 'base.html' %}

{% block title %}Crear Personaje - Academia de Héroes{% endblock %}

{% block content %}
<div class="content">
    <div class="page-header">
        <h2><span class="material-icons">add</span> Crear Nuevo Heroe</h2>
    </div>

    <div class="rpg-card">
        <h3 class="rpg-card-title"><span class="material-icons">security</span> Nuevo Guerrero</h3>
        
        <form method="post" class="rpg-form-styled">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_tipo">Tipo de Personaje</label>
                <select name="tipo" id="id_tipo" required onchange="actualizarCampos()">
                    <option value="">Selecciona un tipo</option>
                    <option value="GUERRERO"><span class="material-icons">security</span> Guerrero</option>
                    <option value="MAGO"><span class="material-icons">auto_fix_high</span> Mago</option>
                    <option value="ARQUERO"><span class="material-icons">gps_fixed</span> Arquero</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="id_nombre">Nombre del Héroe</label>
                <input type="text" name="nombre" id="id_nombre" maxlength="100" required placeholder="Introduce el nombre de tu héroe">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="id_nivel">Nivel</label>
                    <input type="number" name="nivel" id="id_nivel" min="1" max="100" value="1" required>
                </div>
                
                <div class="form-group">
                    <label for="id_vida">Puntos de Vida</label>
                    <input type="number" name="vida" id="id_vida" min="0" value="100" required>
                </div>
                
                <div class="form-group">
                    <label for="id_vida_max">Vida Máxima</label>
                    <input type="number" name="vida_max" id="id_vida_max" min="1" value="100" required>
                </div>
            </div>
            
            <div class="form-group" id="campo_armadura" style="display:none;">
                <label for="id_armadura"><span class="material-icons">shield</span> Armadura</label>
                <input type="number" name="armadura" id="id_armadura" min="0" value="5" placeholder="Puntos de armadura">
            </div>
            
            <div class="form-group" id="campo_mana" style="display:none;">
                <label for="id_mana"><span class="material-icons">water_drop</span> Mana</label>
                <input type="number" name="mana" id="id_mana" min="0" value="50" placeholder="Puntos de mana">
            </div>
            
            <div class="form-group" id="campo_precision" style="display:none;">
                <label for="id_precision"><span class="material-icons">gps_fixed</span> Precision</label>
                <input type="number" name="precision" id="id_precision" min="0" max="100" value="80" placeholder="Porcentaje de precision">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><span class="material-icons">add</span> Crear Heroe</button>
                <a href="{% url 'lista_personajes' %}" class="btn btn-secondary"><span class="material-icons">arrow_back</span> Cancelar</a>
            </div>
        </form>
    </div>

    <script>
        function actualizarCampos() {
            var tipo = document.getElementById('id_tipo').value;
            
            document.getElementById('campo_armadura').style.display = (tipo === 'GUERRERO') ? 'block' : 'none';
            document.getElementById('campo_mana').style.display = (tipo === 'MAGO') ? 'block' : 'none';
            document.getElementById('campo_precision').style.display = (tipo === 'ARQUERO') ? 'block' : 'none';
            
            if (tipo === 'GUERRERO') {
                document.getElementById('id_armadura').value = '5';
            } else if (tipo === 'MAGO') {
                document.getElementById('id_mana').value = '50';
            } else if (tipo === 'ARQUERO') {
                document.getElementById('id_precision').value = '80';
            }
        }
    </script>
</div>
{% endblock %}
